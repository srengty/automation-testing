# CI/CD Environment Configuration

# Application URLs
app.url=${APP_URL:http://localhost:3000}
api.base.url=${API_BASE_URL:http://localhost:8080/api}

# Browser Configuration
headless=true
browser=chrome

# Debug Settings
debug.config=false
api.debug.logging=false

# Test Data - Use environment variables in CI
test.user.valid.username=${TEST_USERNAME:ciuser}
test.user.valid.password=${TEST_PASSWORD:CiPass123!}
test.admin.username=${ADMIN_USERNAME:ciadmin}
test.admin.password=${ADMIN_PASSWORD:AdminPass123!}

# API Configuration
api.key=${API_KEY:}

# Timeouts - Optimized for CI
selenium.implicit.wait=5
selenium.explicit.wait=20
selenium.page.load.timeout=30
api.timeout=20000

# Parallel Execution - Conservative for CI resources
parallel.threads=2

# Screenshot Configuration
screenshot.path=${SCREENSHOT_PATH:target/screenshots/ci}