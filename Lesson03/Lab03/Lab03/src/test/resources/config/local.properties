# Local Development Environment Configuration

# Application URLs
app.url=http://localhost:3000
api.base.url=http://localhost:8080/api

# Browser Configuration
headless=false
browser=chrome

# Debug Settings
debug.config=true
api.debug.logging=true

# Test Data
test.user.valid.username=localuser
test.user.valid.password=localpass

# Timeouts - Longer for local debugging
selenium.explicit.wait=60
api.timeout=60000

# Screenshot Configuration
screenshot.path=target/screenshots/local