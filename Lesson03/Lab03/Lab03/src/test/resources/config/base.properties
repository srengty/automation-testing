# Base Configuration for Test Automation Framework

# Application Configuration
app.url=http://localhost:3000
app.title=Test Automation Demo Application

# API Configuration
api.base.url=http://localhost:8080/api
api.timeout=30000
api.debug.logging=false

# Database Configuration (if needed)
database.url=jdbc:mysql://localhost:3306/testdb
database.user=testuser
database.password=testpass

# Browser Configuration
browser=chrome
headless=false
browser.window.size=1920x1080

# Selenium Timeouts (seconds)
selenium.implicit.wait=10
selenium.explicit.wait=30
selenium.page.load.timeout=60

# Test Data Configuration
test.data.path=src/test/resources/testdata
screenshot.path=target/screenshots

# Parallel Execution Configuration
parallel.enabled=true
parallel.threads=3

# Reporting Configuration
debug.config=false

# Test Users Configuration
test.user.valid.username=testuser
test.user.valid.password=testpass
test.admin.username=admin
test.admin.password=admin123

# Performance Configuration
performance.response.threshold=5000