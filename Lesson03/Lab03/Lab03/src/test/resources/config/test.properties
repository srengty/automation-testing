# Test Environment Configuration

# Application URLs
app.url=https://test-app.example.com
api.base.url=https://test-api.example.com/api

# Browser Configuration
headless=true
browser=chrome

# Debug Settings
debug.config=false
api.debug.logging=false

# Test Data
test.user.valid.username=testuser
test.user.valid.password=TestPass123!
test.admin.username=testadmin
test.admin.password=AdminPass123!

# API Configuration
api.key=test-api-key-12345

# Timeouts
selenium.explicit.wait=30
api.timeout=30000

# Parallel Execution
parallel.threads=5

# Screenshot Configuration
screenshot.path=target/screenshots/test